<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - PoornimaChem</title>
    <link rel="stylesheet" href="welcome.css">
</head>

<body>

    <header class="welcome-navbar">
        <div class="welcome-brand">PoornimaChem</div>
        <div class="hamburger" id="hamburger-menu">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <nav class="welcome-navlinks" id="nav-links">
            <a href="workbench.html">Virtual Lab</a>
            <a href="#about">About</a>
            <a href="#team">Team</a>
            <a href="#support">Support</a>
            <a href="https://www.poornima.org/" class="mobile-cta">Visit Poornima</a>
        </nav>
        <button class="welcome-cta desktop-cta" onclick="window.location.href='https://www.poornima.org/'">
            Visit Poornima
        </button>
    </header>

    <div id="root"></div>

    <!-- React and ReactDOM from CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const images = [
            'assets/carousel/image1.png',
            'assets/carousel/image2.png',
            'assets/carousel/image3.png'
        ];

        function CarouselBackground() {
            const [currentIndex, setCurrentIndex] = useState(0);

            useEffect(() => {
                const interval = setInterval(() => {
                    setCurrentIndex((prevIndex) => (prevIndex + 1) % images.length);
                }, 5000); // Change image every 5 seconds
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="carousel-background">
                    {images.map((img, index) => (
                        <div
                            key={index}
                            className={`carousel-slide ${index === currentIndex ? 'active' : ''}`}
                            style={{ backgroundImage: `url(${img})` }}
                        />
                    ))}
                    <div className="carousel-overlay"></div>
                </div>
            );
        }

        function WelcomePage() {
            const [isHovered, setIsHovered] = useState(false);

            const handleStartClick = () => {
                // Navigate to the main PoornimaChem experience
                window.location.href = './index.html';
            };

            return (
                <>
                    <CarouselBackground />
                    <div className="welcome-container">
                        <h1 className="welcome-title">
                            <span className="welcome-title-line">Welcome to</span>
                            <span className="welcome-title-line">PoornimaChem -</span>
                            <span className="welcome-title-line">Your Trusted</span>
                            <span className="welcome-title-line">Chemistry Lab</span>
                        </h1>

                        <p className="welcome-description">
                            At PoornimaChem, we are dedicated to providing top-notch chemistry lab services.
                            Click here to explore our offerings and learn more.
                        </p>

                        <button
                            className="start-button"
                            onClick={handleStartClick}
                            onMouseEnter={() => setIsHovered(true)}
                            onMouseLeave={() => setIsHovered(false)}
                        >
                            Start
                        </button>
                    </div>
                </>
            );
        }

        // Render the React component
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WelcomePage />);

        // Hamburger Menu Logic
        document.getElementById('hamburger-menu').addEventListener('click', function() {
            this.classList.toggle('active');
            document.getElementById('nav-links').classList.toggle('open');
        });
    </script>
</body>

</html>
